name: Publish Package

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag to publish with
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - latest

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package-version
        shell: bash
        run: echo "value=$(node -p "require('./packages/click-fx/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PACKAGE_VERSION="${{ steps.package-version.outputs.value }}"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Verify changelog entry exists
        shell: bash
        run: |
          PACKAGE_VERSION="${{ steps.package-version.outputs.value }}"
          if ! grep -q "^## ${PACKAGE_VERSION}$" packages/click-fx/CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Resolve npm dist-tag
        id: dist-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DIST_TAG="${{ inputs.dist_tag }}"
          else
            PACKAGE_VERSION="${{ steps.package-version.outputs.value }}"
            case "$PACKAGE_VERSION" in
              *-alpha.*) DIST_TAG="alpha" ;;
              *-beta.*) DIST_TAG="beta" ;;
              *) DIST_TAG="latest" ;;
            esac
          fi
          echo "value=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: npm run build -w packages/click-fx

      - name: Pack package
        run: npm pack -w packages/click-fx

      - name: Publish to npm
        shell: bash
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ]; then
            npm publish -w packages/click-fx --tag "${{ steps.dist-tag.outputs.value }}"
          else
            npm publish -w packages/click-fx --tag "${{ steps.dist-tag.outputs.value }}" --provenance
          fi

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PACKAGE_VERSION="${{ steps.package-version.outputs.value }}"
          awk -v version="$PACKAGE_VERSION" '
            $0 == "## " version { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' packages/click-fx/CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Failed to extract release notes for version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PACKAGE_VERSION="${{ steps.package-version.outputs.value }}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.dist-tag.outputs.value }}" != "latest" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            blue-archive-touch-effect-*.tgz \
            --title "blue-archive-touch-effect v${PACKAGE_VERSION}" \
            --notes-file RELEASE_NOTES.md \
            ${PRERELEASE_FLAG}

      - name: Upload published tarball
        uses: actions/upload-artifact@v4
        with:
          name: published-click-fx-package
          path: blue-archive-touch-effect-*.tgz
          if-no-files-found: error
