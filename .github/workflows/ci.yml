name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace and package
        run: npm run verify

      - name: Upload packed tarball
        uses: actions/upload-artifact@v4
        with:
          name: touch-effect-package
          path: artifacts/blue-archive-touch-effect-*.tgz
          if-no-files-found: error
